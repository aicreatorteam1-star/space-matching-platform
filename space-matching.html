<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Matching Platform — InnOlistic</title>

  <!-- Prompt font — exact import from brand.config.ts line 41 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    /* ==========================================================================
     * InnOlistic Design Tokens — mirrored from src/styles/tokens.css
     * ========================================================================== */
    :root {
      /* Brand palette (6 shades, locked) — brand.config.ts */
      --color-deep-space:       #0B132B;
      --color-electric-purple:  #7C3AED;
      --color-neon-cyan:        #00E5FF;
      --color-tech-slate:       #1E293B;
      --color-silver-gray:      #CBD5E1;
      --color-pure-white:       #FFFFFF;

      /* Semantic aliases */
      --color-bg-app:           var(--color-pure-white);
      --color-bg-surface:       var(--color-pure-white);
      --color-bg-sidebar:       var(--color-deep-space);
      --color-bg-topbar:        var(--color-pure-white);
      --color-border:           var(--color-silver-gray);
      --color-border-subtle:    rgba(203,213,225,0.5);
      --color-text-primary:     var(--color-deep-space);
      --color-text-secondary:   #475569;
      --color-text-inverse:     var(--color-pure-white);
      --color-text-muted:       #94A3B8;
      --color-accent:           var(--color-electric-purple);
      --color-accent-soft:      rgba(124,58,237,0.08);

      /* Gradients (135deg locked) — brand.config.ts */
      --gradient-aurora:  linear-gradient(135deg,#7C3AED 0%,#00E5FF 100%);
      --gradient-galaxy:  linear-gradient(135deg,#0B132B 0%,#1E293B 100%);
      --gradient-energy:  linear-gradient(135deg,#00E5FF 0%,#7C3AED 100%);

      /* Radius scale */
      --radius-sm:    6px;
      --radius-md:    10px;
      --radius-lg:    16px;
      --radius-pill:  999px;

      /* Spacing scale */
      --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px;
      --space-5:20px; --space-6:24px; --space-8:32px; --space-10:40px; --space-12:48px;

      /* Shadows */
      --shadow-sm: 0 1px 2px  rgba(11,19,43,0.04);
      --shadow-md: 0 4px 12px rgba(11,19,43,0.08);
      --shadow-lg: 0 8px 24px rgba(11,19,43,0.12);
      --shadow-xl: 0 16px 40px rgba(11,19,43,0.16);

      /* Motion — locked (global.css) */
      --transition-base: all 0.2s ease;
      --hover-lift:      translateY(-2px);

      /* Typography — brand.config.ts */
      --font-family-base: 'Prompt', system-ui, -apple-system, sans-serif;
      --font-size-base:   14px;
      --font-weight-regular:  400;
      --font-weight-medium:   500;
      --font-weight-semibold: 600;
      --font-weight-bold:     700;

      /* Layout dimensions */
      --sidebar-width:           240px;
      --sidebar-width-collapsed: 72px;
      --topbar-height:           64px;
    }

    /* ==========================================================================
     * Resets — global.css
     * ========================================================================== */
    *, *::before, *::after { box-sizing: border-box; }
    html, body, #root { margin:0; padding:0; height:100%; }

    body {
      font-family: var(--font-family-base);
      font-size: var(--font-size-base);
      color: var(--color-text-primary);
      background: var(--color-bg-app);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    button, input, select, textarea { font-family: inherit; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: var(--radius-pill); }

    /* ==========================================================================
     * Locked hover behaviour — global.css
     * ========================================================================== */
    .io-interactive { transition: var(--transition-base); cursor: pointer; }
    .io-card-hover  { transition: var(--transition-base); }
    .io-card-hover:hover { transform: var(--hover-lift); box-shadow: var(--shadow-lg); }

    /* ==========================================================================
     * AppLayout shell
     * ========================================================================== */
    .app-shell { display: flex; height: 100vh; overflow: hidden; }

    /* Sidebar — galaxy gradient background, from AppLayout */
    .sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      background: var(--gradient-galaxy);
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: relative;
      z-index: 20;
    }
    .sidebar-logo {
      height: var(--topbar-height);
      display: flex; align-items: center;
      padding: 0 var(--space-6);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      gap: var(--space-3);
      flex-shrink: 0;
    }
    .sidebar-logo-mark {
      width: 32px; height: 32px;
      background: var(--gradient-aurora);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-weight: var(--font-weight-bold);
      font-size: 13px;
      color: var(--color-pure-white);
      flex-shrink: 0;
    }
    .sidebar-logo-text { color: var(--color-pure-white); font-weight: var(--font-weight-semibold); font-size: 15px; }
    .sidebar-logo-sub  { color: rgba(255,255,255,.45); font-size: 11px; margin-top: 1px; }
    .sidebar-nav { flex: 1; padding: var(--space-4) var(--space-3); overflow-y: auto; }
    .sidebar-section-title {
      font-size: 10px; font-weight: var(--font-weight-semibold);
      color: rgba(255,255,255,.35);
      letter-spacing: .08em; text-transform: uppercase;
      padding: var(--space-3) var(--space-3) var(--space-2);
    }
    .nav-item {
      display: flex; align-items: center; gap: var(--space-3);
      padding: 9px var(--space-3);
      border-radius: var(--radius-md);
      cursor: pointer;
      color: rgba(255,255,255,.55);
      font-size: 13.5px; font-weight: var(--font-weight-medium);
      transition: var(--transition-base);
      margin-bottom: 2px;
    }
    .nav-item:hover { background: rgba(255,255,255,.07); color: rgba(255,255,255,.9); }
    .nav-item.active {
      background: var(--gradient-aurora);
      color: var(--color-pure-white);
      box-shadow: 0 4px 14px rgba(124,58,237,0.35);
    }
    .nav-icon { font-size: 16px; flex-shrink: 0; }
    .sidebar-footer {
      padding: var(--space-4) var(--space-6);
      border-top: 1px solid rgba(255,255,255,.08);
    }
    .sidebar-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(0,229,255,.12);
      color: var(--color-neon-cyan);
      font-size: 11px; font-weight: var(--font-weight-semibold);
      padding: 4px 10px; border-radius: var(--radius-pill);
    }

    /* ==========================================================================
     * Topbar — Topbar.tsx, height 64px, sticky z-10
     * ========================================================================== */
    .topbar {
      height: var(--topbar-height);
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-6);
      border-bottom: 1px solid rgba(203,213,225,0.5);
      position: sticky; top: 0; z-index: 10;
      background: var(--color-bg-topbar);
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: var(--space-3); }
    .topbar-search {
      display: flex; align-items: center; gap: var(--space-2);
      background: #F8FAFC;
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-md);
      padding: 0 var(--space-3);
      height: 36px; width: 320px;
      color: var(--color-text-muted); font-size: 13px;
    }
    .topbar-right { display: flex; align-items: center; gap: var(--space-3); }
    .icon-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: none; background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--color-text-secondary);
      transition: var(--transition-base);
    }
    .icon-btn:hover { background: var(--color-accent-soft); color: var(--color-electric-purple); }
    .notif-wrap { position: relative; }
    .notif-dot {
      position: absolute; top: 4px; right: 4px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--color-electric-purple);
      border: 2px solid var(--color-pure-white);
    }
    /* Avatar — Aurora gradient, same as Topbar.tsx */
    .topbar-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--gradient-aurora);
      display: flex; align-items: center; justify-content: center;
      color: var(--color-pure-white);
      font-weight: var(--font-weight-semibold); font-size: 13px;
      cursor: pointer;
    }
    .topbar-user { display: flex; align-items: center; gap: var(--space-2); cursor: pointer; }
    .topbar-user-name  { font-weight: var(--font-weight-semibold); font-size: 13.5px; }
    .topbar-user-role  { font-size: 11px; color: var(--color-text-muted); }

    /* ==========================================================================
     * Page Content
     * ========================================================================== */
    .main-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .page-content { flex: 1; overflow-y: auto; padding: var(--space-8) var(--space-8) 80px; }
    .page-max { max-width: 820px; margin: 0 auto; }

    /* PageHeader */
    .page-header { margin-bottom: var(--space-8); }
    .page-title {
      font-size: 22px; font-weight: var(--font-weight-bold);
      color: var(--color-text-primary); margin-bottom: 4px;
    }
    .page-sub { font-size: 14px; color: var(--color-text-secondary); }

    /* ==========================================================================
     * StatCard — mirrored from cards/StatCard.tsx
     * ========================================================================== */
    .stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: var(--space-4); margin-bottom: var(--space-8); }
    .stat-card {
      padding: var(--space-5);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border-subtle);
      background: var(--color-bg-surface);
      transition: var(--transition-base);
    }
    .stat-card:hover { transform: var(--hover-lift); box-shadow: var(--shadow-lg); }
    .stat-card.aurora { background: var(--gradient-aurora); border: none; }
    .stat-card.galaxy { background: var(--gradient-galaxy); border: none; }
    .stat-card.energy { background: var(--gradient-energy); border: none; }
    .stat-card-head { display: flex; justify-content: space-between; align-items: flex-start; }
    .stat-card-label { font-size: 13px; font-weight: var(--font-weight-medium); color: var(--color-text-muted); }
    .stat-card.aurora .stat-card-label,
    .stat-card.galaxy .stat-card-label,
    .stat-card.energy .stat-card-label { color: rgba(255,255,255,.7); }
    .stat-card-value {
      font-size: 26px; font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary); margin-top: 6px;
      letter-spacing: -0.5px; font-variant-numeric: tabular-nums;
    }
    .stat-card.aurora .stat-card-value,
    .stat-card.galaxy .stat-card-value,
    .stat-card.energy .stat-card-value { color: var(--color-pure-white); }
    .stat-card-icon {
      width: 44px; height: 44px; border-radius: var(--radius-md);
      background: var(--color-accent-soft);
      color: var(--color-electric-purple);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .stat-card.aurora .stat-card-icon,
    .stat-card.galaxy .stat-card-icon { background: rgba(255,255,255,.12); color: var(--color-neon-cyan); }

    /* ==========================================================================
     * Step Progress Bar
     * ========================================================================== */
    .stepper {
      display: flex; align-items: center;
      margin-bottom: var(--space-8);
    }
    .step-item { display: flex; align-items: center; gap: var(--space-3); }
    .step-circle {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: var(--font-weight-semibold);
      border: 2px solid var(--color-border);
      background: var(--color-bg-surface);
      color: var(--color-text-muted);
      transition: var(--transition-base);
      flex-shrink: 0;
    }
    .step-circle.active {
      background: var(--gradient-aurora);
      border-color: transparent;
      color: var(--color-pure-white);
      box-shadow: 0 4px 14px rgba(124,58,237,.3);
    }
    .step-circle.done {
      background: #10B981;
      border-color: transparent;
      color: var(--color-pure-white);
    }
    .step-label { font-size: 13px; font-weight: var(--font-weight-medium); color: var(--color-text-muted); white-space: nowrap; }
    .step-label.active { color: var(--color-electric-purple); font-weight: var(--font-weight-semibold); }
    .step-label.done   { color: #10B981; }
    .step-line { flex: 1; height: 2px; background: var(--color-border); margin: 0 var(--space-3); transition: var(--transition-base); }
    .step-line.done { background: #10B981; }

    /* ==========================================================================
     * Card surface (StatCard-style)
     * ========================================================================== */
    .surface {
      background: var(--color-bg-surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border-subtle);
      padding: var(--space-6) var(--space-8);
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--space-5);
      transition: var(--transition-base);
    }
    .surface:hover { box-shadow: var(--shadow-md); }
    .surface-title {
      font-size: 16px; font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
      display: flex; align-items: center; gap: var(--space-3);
      margin-bottom: 4px;
    }
    .surface-title-icon {
      width: 32px; height: 32px; border-radius: var(--radius-md);
      background: var(--color-accent-soft);
      color: var(--color-electric-purple);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    .surface-sub { font-size: 13px; color: var(--color-text-secondary); margin-bottom: var(--space-5); padding-left: 44px; }

    /* ==========================================================================
     * Location Cards
     * ========================================================================== */
    .location-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: var(--space-4); }
    .loc-card {
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-5) var(--space-4);
      cursor: pointer;
      text-align: center;
      transition: var(--transition-base);
      background: var(--color-bg-surface);
      position: relative; overflow: hidden;
    }
    .loc-card:hover {
      border-color: var(--color-electric-purple);
      transform: var(--hover-lift);
      box-shadow: var(--shadow-lg);
    }
    .loc-card.selected {
      border-color: var(--color-electric-purple);
      background: var(--color-accent-soft);
      box-shadow: 0 0 0 3px rgba(124,58,237,.12);
    }
    .loc-card-check {
      position: absolute; top: 10px; right: 10px;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--gradient-aurora);
      color: #fff; font-size: 10px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: scale(.5);
      transition: var(--transition-base);
    }
    .loc-card.selected .loc-card-check { opacity: 1; transform: scale(1); }
    .loc-card-icon { font-size: 28px; margin-bottom: var(--space-2); }
    .loc-card-name { font-size: 15px; font-weight: var(--font-weight-semibold); color: var(--color-text-primary); }
    .loc-card.selected .loc-card-name { color: var(--color-electric-purple); }
    .loc-card-desc { font-size: 12px; color: var(--color-text-secondary); margin-top: 4px; }

    /* ==========================================================================
     * Item Counter
     * ========================================================================== */
    .item-list { display: flex; flex-direction: column; gap: var(--space-3); }
    .item-row {
      display: flex; align-items: center;
      background: #F8FAFC;
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-md);
      padding: 13px var(--space-5);
      transition: var(--transition-base);
    }
    .item-row.active {
      border-color: rgba(124,58,237,.3);
      background: var(--color-accent-soft);
    }
    .item-emoji { font-size: 22px; margin-right: var(--space-4); flex-shrink: 0; }
    .item-info { flex: 1; }
    .item-name { font-size: 13.5px; font-weight: var(--font-weight-medium); color: var(--color-text-primary); }
    .item-hint { font-size: 12px; color: var(--color-text-muted); margin-top: 2px; }
    .unit-pill {
      font-size: 10px; font-weight: var(--font-weight-semibold);
      background: var(--color-accent-soft);
      color: var(--color-electric-purple);
      padding: 2px 8px; border-radius: var(--radius-pill);
      margin-left: var(--space-2);
    }
    .item-row.active .unit-pill { background: var(--color-electric-purple); color: #fff; }

    /* Counter — PrimaryButton style for + */
    .counter-wrap { display: flex; align-items: center; gap: var(--space-2); }
    .counter-btn {
      width: 32px; height: 32px; border-radius: var(--radius-md);
      border: 1.5px solid var(--color-border);
      background: var(--color-bg-surface);
      cursor: pointer; font-size: 16px; font-weight: 400;
      color: var(--color-text-secondary);
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition-base);
    }
    .counter-btn:hover:not(:disabled) {
      border-color: var(--color-electric-purple);
      color: var(--color-electric-purple);
      background: var(--color-accent-soft);
      transform: var(--hover-lift);
    }
    .counter-btn.plus:hover:not(:disabled) {
      background: var(--gradient-aurora);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 14px rgba(124,58,237,.28);
    }
    .counter-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; }
    .counter-val { width: 32px; text-align: center; font-size: 16px; font-weight: var(--font-weight-semibold); }

    /* Volume progress bar */
    .vol-wrap {
      margin-top: var(--space-5);
      background: #F8FAFC;
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-4) var(--space-5);
    }
    .vol-label {
      display: flex; justify-content: space-between;
      font-size: 13px; color: var(--color-text-secondary);
      margin-bottom: var(--space-2);
    }
    .vol-label span:last-child { font-weight: var(--font-weight-semibold); color: var(--color-electric-purple); }
    .vol-track {
      height: 6px; border-radius: var(--radius-pill);
      background: var(--color-border);
      overflow: hidden; margin-bottom: var(--space-3);
    }
    .vol-fill {
      height: 100%; border-radius: var(--radius-pill);
      background: var(--gradient-aurora);
      transition: width .4s ease;
    }
    .vol-tiers { display: flex; gap: var(--space-2); }
    .tier-chip {
      flex: 1; text-align: center;
      font-size: 11px; font-weight: var(--font-weight-medium);
      padding: 4px 6px; border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      color: var(--color-text-muted);
      background: var(--color-bg-surface);
      transition: var(--transition-base);
    }
    .tier-chip.current {
      background: var(--gradient-aurora);
      border-color: transparent;
      color: var(--color-pure-white);
      box-shadow: 0 2px 8px rgba(124,58,237,.25);
    }

    /* ==========================================================================
     * PrimaryButton — mirrors PrimaryButton.tsx exactly
     * ========================================================================== */
    .btn-primary {
      height: 40px; padding: 0 var(--space-5);
      background: var(--gradient-aurora);
      border: none; border-radius: var(--radius-md);
      color: var(--color-pure-white);
      font-family: inherit; font-size: 14px; font-weight: var(--font-weight-medium);
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(124,58,237,0.28);
      display: inline-flex; align-items: center; gap: var(--space-2);
      transition: var(--transition-base);
      white-space: nowrap;
    }
    .btn-primary:hover:not(:disabled) {
      transform: var(--hover-lift);
      box-shadow: 0 8px 22px rgba(124,58,237,0.38);
    }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-primary.lg { height: 48px; font-size: 15px; padding: 0 var(--space-8); }

    /* SecondaryButton */
    .btn-secondary {
      height: 40px; padding: 0 var(--space-5);
      background: transparent;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      color: var(--color-text-secondary);
      font-family: inherit; font-size: 14px; font-weight: var(--font-weight-medium);
      cursor: pointer;
      display: inline-flex; align-items: center; gap: var(--space-2);
      transition: var(--transition-base);
    }
    .btn-secondary:hover {
      border-color: var(--color-electric-purple);
      color: var(--color-electric-purple);
      background: var(--color-accent-soft);
    }
    .btn-row { display: flex; justify-content: flex-end; gap: var(--space-3); margin-top: var(--space-6); }

    /* ==========================================================================
     * Match Result Cards
     * ========================================================================== */
    .match-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: var(--space-4); margin-bottom: var(--space-5); }
    .match-card {
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-5) var(--space-4);
      text-align: center;
      cursor: pointer;
      transition: var(--transition-base);
      background: var(--color-bg-surface);
      position: relative;
    }
    .match-card:hover {
      border-color: var(--color-electric-purple);
      transform: var(--hover-lift);
      box-shadow: var(--shadow-lg);
    }
    .match-card.recommended { border-color: var(--color-electric-purple); }
    .match-card.selected-m {
      border-color: var(--color-electric-purple);
      background: var(--color-accent-soft);
      box-shadow: 0 0 0 3px rgba(124,58,237,.15);
    }
    .rec-badge {
      position: absolute; top: -11px; left: 50%; transform: translateX(-50%);
      background: var(--gradient-aurora);
      color: var(--color-pure-white);
      font-size: 10px; font-weight: var(--font-weight-semibold);
      padding: 3px 12px; border-radius: var(--radius-pill);
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(124,58,237,.3);
    }
    .match-size { font-size: 26px; font-weight: var(--font-weight-bold); color: var(--color-electric-purple); margin-bottom: 2px; }
    .match-dim  { font-size: 12px; color: var(--color-text-muted); margin-bottom: var(--space-3); }
    .match-price { font-size: 20px; font-weight: var(--font-weight-bold); color: var(--color-text-primary); }
    .match-price-sub { font-size: 11px; color: var(--color-text-muted); }
    .match-features { margin-top: var(--space-3); font-size: 11.5px; color: var(--color-text-secondary); display: flex; flex-direction: column; gap: 3px; text-align: left; }
    .match-features span::before { content: "✓ "; color: #10B981; font-weight: var(--font-weight-bold); }
    .selected-tick {
      margin-top: var(--space-3); font-size: 12px; font-weight: var(--font-weight-semibold);
      color: var(--color-electric-purple);
      background: var(--color-accent-soft);
      border-radius: var(--radius-sm); padding: 3px 8px;
      display: inline-block;
    }

    /* Summary row */
    .summary-bar {
      display: flex; align-items: center; flex-wrap: wrap; gap: var(--space-3);
      background: #F8FAFC; border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-md); padding: var(--space-3) var(--space-4);
      margin-bottom: var(--space-5); font-size: 13px; color: var(--color-text-secondary);
    }
    .summary-bar strong { color: var(--color-text-primary); }
    .summary-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--color-electric-purple); flex-shrink: 0; }

    /* ==========================================================================
     * Contact Form
     * ========================================================================== */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 13px; font-weight: var(--font-weight-medium); color: var(--color-text-primary); }
    .form-label .req { color: #EF4444; margin-left: 2px; }
    .form-input {
      height: 40px;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 0 var(--space-4);
      font-family: inherit; font-size: 14px; color: var(--color-text-primary);
      background: var(--color-bg-surface);
      transition: var(--transition-base);
      outline: none;
    }
    .form-input:focus {
      border-color: var(--color-electric-purple);
      box-shadow: 0 0 0 3px var(--color-accent-soft);
    }
    .form-input::placeholder { color: var(--color-text-muted); }
    .form-err { font-size: 12px; color: #EF4444; margin-top: 2px; }
    .form-textarea {
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      font-family: inherit; font-size: 14px; color: var(--color-text-primary);
      background: var(--color-bg-surface);
      transition: var(--transition-base);
      outline: none; resize: vertical; min-height: 80px; grid-column: 1/-1;
    }
    .form-textarea:focus {
      border-color: var(--color-electric-purple);
      box-shadow: 0 0 0 3px var(--color-accent-soft);
    }
    .selected-summary {
      margin-top: var(--space-4);
      background: var(--color-accent-soft);
      border: 1px solid rgba(124,58,237,.25);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      font-size: 13px; color: var(--color-electric-purple);
      display: flex; align-items: center; gap: var(--space-2);
    }

    /* ==========================================================================
     * Success Screen — ResultSuccess.tsx style
     * ========================================================================== */
    .success-wrap { text-align: center; padding: var(--space-12) var(--space-6); }
    .success-icon-ring {
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(16,185,129,.12);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto var(--space-5);
      animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
    }
    .success-icon-inner {
      width: 54px; height: 54px; border-radius: 50%;
      background: linear-gradient(135deg,#10B981,#34D399);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; color: #fff;
    }
    @keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
    .success-title { font-size: 24px; font-weight: var(--font-weight-bold); color: var(--color-text-primary); margin-bottom: var(--space-2); }
    .success-sub   { font-size: 14px; color: var(--color-text-secondary); max-width: 360px; margin: 0 auto var(--space-6); line-height: 1.7; }
    .ref-chip {
      display: inline-flex; align-items: center; gap: var(--space-2);
      background: var(--color-accent-soft);
      border: 1px solid rgba(124,58,237,.3);
      border-radius: var(--radius-pill);
      padding: var(--space-2) var(--space-5);
      font-size: 14px; font-weight: var(--font-weight-semibold);
      color: var(--color-electric-purple);
      margin-bottom: var(--space-3);
    }

    /* ==========================================================================
     * Fade-in page transition
     * ========================================================================== */
    .fade-in { animation: fadeUp .25s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    /* ==========================================================================
     * Responsive
     * ========================================================================== */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .location-grid, .match-grid, .stat-grid { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .page-content { padding: var(--space-5) var(--space-4) 60px; }
      .surface { padding: var(--space-5) var(--space-4); }
      .topbar-search { width: 180px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    /* ── Data ─────────────────────────────────────────────────────────── */
    const LOCATIONS = [
      { id: "sukhumvit", name: "สุขุมวิท", icon: "🏙️", desc: "BTS พร้อมพงษ์ — สถานี 4", address: "ซ.สุขุมวิท 39, กทม." },
      { id: "bangna",    name: "บางนา",    icon: "🏗️", desc: "ติด Mega Bangna / Express", address: "บางนา-ตราด กม.2, กทม." },
      { id: "rama3",     name: "พระราม 3", icon: "🌊", desc: "ริมแม่น้ำ — เส้นทางสะดวก", address: "ถ.พระราม 3, กทม." },
    ];

    const ITEMS = [
      { id: "box",      emoji: "📦", name: "กล่องลัง",         hint: "ขนาดมาตรฐาน 40×40 cm",  units: 1 },
      { id: "luggage",  emoji: "🧳", name: "กระเป๋าเดินทาง",  hint: "ขนาด 28 นิ้ว",           units: 2 },
      { id: "wardrobe", emoji: "🪞", name: "ตู้เสื้อผ้า",     hint: "2 บาน / มาตรฐาน",         units: 5 },
      { id: "fridge",   emoji: "🧊", name: "ตู้เย็น",          hint: "1–2 ประตู",               units: 6 },
      { id: "sofa",     emoji: "🛋️", name: "โซฟา",            hint: "3–4 ที่นั่ง",              units: 8 },
    ];

    const TIERS = [
      { id:"S", label:"Size S", dim:"1 × 2 m", area:"2 ตร.ม.", price:1500, max:8,
        features:["เหมาะสำหรับกล่องและกระเป๋า","ระบบกล้องวงจรปิด 24 ชม.","ประกันของสูงสุด ฿10,000"] },
      { id:"M", label:"Size M", dim:"2 × 3 m", area:"6 ตร.ม.", price:2800, max:20,
        features:["เหมาะสำหรับเฟอร์นิเจอร์ขนาดกลาง","ควบคุมความชื้น","ประกันของสูงสุด ฿30,000"] },
      { id:"L", label:"Size L", dim:"3 × 4 m", area:"12 ตร.ม.", price:4500, max:Infinity,
        features:["เหมาะสำหรับเฟอร์นิเจอร์ครบชุด","ระบบปรับอากาศ","ประกันของสูงสุด ฿80,000"] },
    ];

    function getTier(units) {
      if (!units) return null;
      if (units <= 8)  return "S";
      if (units <= 20) return "M";
      return "L";
    }

    /* ── Topbar ────────────────────────────────────────────────────────── */
    function Topbar() {
      return (
        <div className="topbar">
          <div className="topbar-left">
            <div className="topbar-search">
              <span style={{fontSize:14}}>🔍</span>
              <span>ค้นหาทำเล สาขา หรือบริการ…</span>
            </div>
          </div>
          <div className="topbar-right">
            <button className="icon-btn" title="Toggle dark mode">🌙</button>
            <div className="notif-wrap">
              <button className="icon-btn">🔔</button>
              <div className="notif-dot"/>
            </div>
            <div className="topbar-user io-interactive">
              <div className="topbar-avatar">AM</div>
              <div>
                <div className="topbar-user-name">Alex Morgan</div>
                <div className="topbar-user-role">Admin</div>
              </div>
              <span style={{fontSize:12,color:'var(--color-text-muted)'}}>▾</span>
            </div>
          </div>
        </div>
      );
    }

    /* ── Sidebar ───────────────────────────────────────────────────────── */
    function Sidebar({ step }) {
      const nav = [
        { icon:"📊", label:"Dashboard", path:"/" },
        { icon:"📦", label:"Space Matching", path:"/space", active: true },
        { icon:"📋", label:"รายการจอง", path:"/orders" },
        { icon:"🏢", label:"จัดการสาขา", path:"/branches" },
        { icon:"⚙️", label:"ตั้งค่า", path:"/settings" },
      ];
      return (
        <div className="sidebar">
          <div className="sidebar-logo">
            <div className="sidebar-logo-mark">SM</div>
            <div>
              <div className="sidebar-logo-text">SpaceMatch</div>
              <div className="sidebar-logo-sub">InnOlistic Platform</div>
            </div>
          </div>
          <div className="sidebar-nav">
            <div className="sidebar-section-title">Main Menu</div>
            {nav.map(n => (
              <div key={n.path} className={`nav-item ${n.active ? "active" : ""}`}>
                <span className="nav-icon">{n.icon}</span>
                <span>{n.label}</span>
              </div>
            ))}
            <div className="sidebar-section-title" style={{marginTop:16}}>Progress</div>
            {["เลือกทำเล","ระบุสิ่งของ","ผลการจับคู่"].map((s,i) => (
              <div key={i} className={`nav-item ${step === i ? "active" : ""}`} style={{fontSize:12}}>
                <span className="nav-icon">{step > i ? "✅" : step === i ? "▶️" : "⭕"}</span>
                <span>Step {i+1}: {s}</span>
              </div>
            ))}
          </div>
          <div className="sidebar-footer">
            <div className="sidebar-badge">✦ Preview Build</div>
          </div>
        </div>
      );
    }

    /* ── StatCards row ─────────────────────────────────────────────────── */
    function StatRow({ counts, location }) {
      const totalUnits = ITEMS.reduce((s,i) => s + i.units*(counts[i.id]||0), 0);
      const totalItems = ITEMS.reduce((s,i) => s + (counts[i.id]||0), 0);
      const tier = getTier(totalUnits);
      const t = TIERS.find(x => x.id === tier);
      return (
        <div className="stat-grid">
          <div className="stat-card aurora io-card-hover">
            <div className="stat-card-head">
              <div>
                <div className="stat-card-label">ทำเลที่เลือก</div>
                <div className="stat-card-value" style={{fontSize:18,marginTop:6}}>
                  {location ? LOCATIONS.find(l=>l.id===location)?.name : "—"}
                </div>
              </div>
              <div className="stat-card-icon">📍</div>
            </div>
          </div>
          <div className="stat-card io-card-hover">
            <div className="stat-card-head">
              <div>
                <div className="stat-card-label">จำนวนสิ่งของ</div>
                <div className="stat-card-value">{totalItems} <span style={{fontSize:14}}>ชิ้น</span></div>
              </div>
              <div className="stat-card-icon">📦</div>
            </div>
          </div>
          <div className="stat-card galaxy io-card-hover">
            <div className="stat-card-head">
              <div>
                <div className="stat-card-label">ขนาดห้องที่แนะนำ</div>
                <div className="stat-card-value" style={{fontSize:18,marginTop:6}}>
                  {tier ? `${tier} — ฿${t.price.toLocaleString()}/เดือน` : "—"}
                </div>
              </div>
              <div className="stat-card-icon">🏠</div>
            </div>
          </div>
        </div>
      );
    }

    /* ── Step Bar ──────────────────────────────────────────────────────── */
    function StepBar({ step }) {
      const steps = ["เลือกทำเล","ระบุสิ่งของ","ผลการจับคู่"];
      return (
        <div className="stepper">
          {steps.map((s,i) => (
            <React.Fragment key={i}>
              <div className="step-item">
                <div className={`step-circle ${step===i?"active":step>i?"done":""}`}>
                  {step>i ? "✓" : i+1}
                </div>
                <span className={`step-label ${step===i?"active":step>i?"done":""}`}>{s}</span>
              </div>
              {i < steps.length-1 && (
                <div className={`step-line ${step>i?"done":""}`}/>
              )}
            </React.Fragment>
          ))}
        </div>
      );
    }

    /* ── Step 1 ────────────────────────────────────────────────────────── */
    function Step1({ location, setLocation, onNext }) {
      return (
        <div className="fade-in">
          <div className="surface">
            <div className="surface-title">
              <div className="surface-title-icon">📍</div>
              เลือกทำเล / สาขา
            </div>
            <p className="surface-sub">เลือกสาขาที่ต้องการฝากเก็บของ — ให้บริการ 3 ทำเลกลางกรุงเทพฯ</p>
            <div className="location-grid">
              {LOCATIONS.map(loc => (
                <div key={loc.id}
                  className={`loc-card io-card-hover ${location===loc.id?"selected":""}`}
                  onClick={() => setLocation(loc.id)}
                >
                  <div className="loc-card-check">✓</div>
                  <div className="loc-card-icon">{loc.icon}</div>
                  <div className="loc-card-name">{loc.name}</div>
                  <div className="loc-card-desc">{loc.desc}</div>
                  <div className="loc-card-desc" style={{marginTop:3,fontSize:11}}>{loc.address}</div>
                </div>
              ))}
            </div>
            <div className="btn-row">
              <button className="btn-primary lg" disabled={!location} onClick={onNext}>
                ถัดไป — ระบุสิ่งของ →
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ── Step 2 ────────────────────────────────────────────────────────── */
    function Step2({ counts, setCount, onNext, onBack }) {
      const totalUnits = useMemo(() =>
        ITEMS.reduce((s,i) => s + i.units*(counts[i.id]||0), 0), [counts]);
      const tier = getTier(totalUnits);
      const barPct = Math.min((totalUnits/30)*100, 100);

      return (
        <div className="fade-in">
          <div className="surface">
            <div className="surface-title">
              <div className="surface-title-icon">📋</div>
              ระบุรายละเอียดสิ่งของ
            </div>
            <p className="surface-sub">กด + เพื่อเพิ่มจำนวน — ระบบคำนวณขนาดห้องให้อัตโนมัติ</p>
            <div className="item-list
